  <style>
    /* === Reset === */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f8;
    }

    /* === Header (fast rad längst upp) === */
    #nap-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      background: #f8f9fa;
      border-bottom: 1px solid #dde2e8;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 14px;
      z-index: 1000;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    #nap-title {
      font-size: 14px;
      font-weight: 700;
      color: #1a2d42;
      line-height: 1.35;
      white-space: nowrap;
    }

    #nap-subtitle {
      display: block;
      font-size: 11px;
      font-weight: 400;
      color: #6b7f94;
    }

    /* === Karta (fyller resten av fönstret under headern) === */
    #map {
      position: fixed;
      top: 56px; left: 0; right: 0; bottom: 0;
    }

    /* === Legend (nere till vänster) === */
    #nap-legend {
      position: fixed;
      bottom: 24px;
      left: 12px;
      background: rgba(255,255,255,0.95);
      border: 1px solid #dde2e8;
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 1000;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      min-width: 190px;
    }

    .nap-legend-title {
      font-size: 10px;
      font-weight: 700;
      color: #4a6a8e;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }

    .nap-legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #334e68;
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .nap-legend-item:last-child { margin-bottom: 0; }

    .nap-legend-swatch {
      width: 16px;
      height: 11px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* === Leaflet tweaks === */
    .leaflet-control-attribution { font-size: 10px !important; }
    .leaflet-control-zoom {
      border: none !important;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12) !important;
    }

    /* === Tooltip === */
    .nap-tooltip {
      background: #ffffff;
      border: 1px solid #dde2e8;
      border-radius: 4px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.10);
      padding: 8px 10px;
      max-width: 320px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      line-height: 1.4;
      color: #334e68;
      pointer-events: none;
      white-space: normal;
    }
    .nap-tooltip::before { display: none; }
    .nap-tooltip .tt-title {
      font-weight: 700;
      color: #1a2d42;
      margin-bottom: 3px;
    }
    .nap-tooltip .tt-names {
      font-size: 0.9em;
      color: #6b7f94;
      margin-left: 10px;
      margin-top: 1px;
    }
  </style>

  // ── Färger per deadline-kategori (Palett B – Skiffer) ────────────────────
  // Passerad = mörkast (läsaren dras dit, mest information)
  // Tidsnära = mellanmörk, Längre fram = ljusast
  // Täckningsområde = separat grå
  const COLORS = {
    'Passerad':        { fill: '#2c4a6e' },
    'Tidsnära':        { fill: '#6b8cae' },
    'Längre fram':     { fill: '#c0cfd9' },
    'Täckningsområde': { fill: '#b0b0b0' },
  };

  // Enhetlig kantlinjefärg för alla kategorier — ljusgrå, inte
  // kategorispecifik. Vid 0.6 px vikt och 0.9 fyllning är det
  // tillräckligt för att separera polygoner utan att skapa visuell brus.
  const STROKE_COLOR  = '#aab5be';
  const STROKE_WEIGHT = 0.6;

  function getColors(kategori) {
    return COLORS[kategori] || COLORS['Täckningsområde'];
  }

  // ── Tooltip-hjälpfunktioner ───────────────────────────────────────────────
  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  const MANADER = ['januari','februari','mars','april','maj','juni',
                   'juli','augusti','september','oktober','november','december'];
  function formateraDatum(iso) {
    if (!iso) return '';
    const [y, m, d] = iso.split('-');
    return parseInt(d, 10) + ' ' + MANADER[parseInt(m, 10) - 1] + ' ' + y;
  }

  function buildTooltipHTML(p) {
    const titel = '<div class="tt-title">'
      + escapeHtml(p.provningsgrupp_namn)
      + ' (' + escapeHtml(p.provningsgrupp_id) + ')</div>';

    // Täckningsområde — inga kraftverk
    if (!p.har_kraftverk) {
      return titel + '<div>Täckningsområde — inga anmälda kraftverk</div>';
    }

    // Aktiv prövningsgrupp
    let html = titel;
    if (p.deadline) {
      html += '<div>Deadline: ' + escapeHtml(formateraDatum(p.deadline))
            + ' (' + escapeHtml(p.deadline_kategori) + ')</div>';
    }
    html += '<div>Totalt: ' + p.antal_kraftverk + ' kraftverk</div>';

    const rader = [
      { label: 'Avslutad (laga kraft)', antal: p.antal_avslutad,   namn: p.namn_avslutad    },
      { label: 'Pågår',                 antal: p.antal_pagar,       namn: p.namn_pagar       },
      { label: 'Ej påbörjad',           antal: p.antal_ej_paborjad, namn: p.namn_ej_paborjad },
    ];
    for (const r of rader) {
      if (r.antal > 0) {
        html += '<div>• ' + escapeHtml(r.label) + ': ' + r.antal + '</div>';
        if (r.namn) {
          html += '<div class="tt-names">' + escapeHtml(r.namn) + '</div>';
        }
      }
    }
    return html;
  }

  // ── Initiera Leaflet-karta ────────────────────────────────────────────────
  // Ingen fast center/zoom — vi använder fitBounds så att hela Sverige
  // (Treriksröset i norr till Smygehuk i söder) alltid ryms i vyn.
  const map = L.map('map', {
    zoomControl: true,
  });

  // Sveriges ungefärliga geografiska ytterkanter med lite marginal
  const SWEDEN_BOUNDS = L.latLngBounds(
    L.latLng(55.0, 10.5),   // sydväst (utanför Smygehuk/Falsterbo)
    L.latLng(69.5, 24.5),   // nordost (utanför Treriksröset)
  );
  map.fitBounds(SWEDEN_BOUNDS);

  // CartoDB Light — neutral bakgrund som inte konkurrerar med polygonfärgerna
  L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    {
      attribution:
        '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>' +
        ' contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      maxZoom: 19,
    }
  ).addTo(map);

  // ── Lägg till polygoner ───────────────────────────────────────────────────
  // Vi sparar referensen till lagret för att kunna återställa stil vid mouseout
  const polygonLayer = L.geoJSON(GEOJSON_DATA, {

    // Färglägg varje polygon baserat på deadline_kategori
    style: function(feature) {
      const c = getColors(feature.properties.deadline_kategori);
      return {
        color:       STROKE_COLOR,   // enhetlig ljusgrå kantlinje
        weight:      STROKE_WEIGHT,  // 0.6 px — tunn nog att inte grumla täta ytor
        fillColor:   c.fill,
        fillOpacity: 0.9,            // nära opak — bakgrunden läcker inte igenom
      };
    },

    // Hover-effekt och tooltip
    onEachFeature: function(feature, layer) {
      layer.bindTooltip(buildTooltipHTML(feature.properties),
        { sticky: true, direction: 'auto', className: 'nap-tooltip' });
      layer.on({
        mouseover: function() {
          this.setStyle({ fillOpacity: 1.0, weight: 1.5, color: '#556677' });
          // bringToFront() hindrar angränsande polygoner från att rita sin
          // kant ovanpå den aktiva — ser renare ut vid zoomade nivåer
          this.bringToFront();
        },
        mouseout: function() {
          polygonLayer.resetStyle(this);
        },
      });
    },

  }).addTo(map);

</script>
